<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MM Cooking Bowl – Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAHze7tEfPEbpyDr6FdlF-vNbQ_oVnHk9U",
    authDomain: "mm-cooking-bowl.firebaseapp.com",
    projectId: "mm-cooking-bowl",
    storageBucket: "mm-cooking-bowl.firebasestorage.app",
    messagingSenderId: "848879523693",
    appId: "1:848879523693:web:65ba75400364e016fa6c64",
    measurementId: "G-203833P63D"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const SERVICE_ID  = "service_pdfir0i";
  const PUBLIC_KEY  = "EHkb3AF-2Z-gSIoda";
  const TPL_ORDER   = "template_si3uebe";
  emailjs.init(PUBLIC_KEY);

  const ADMIN_PASS = "ganeshrocky@124";

  window.adminLogin = function() {
    const pass = document.getElementById("pass-input").value;
    if (pass === ADMIN_PASS) {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      loadOrders();
    } else {
      document.getElementById("login-error").textContent = "Wrong password!";
    }
  };

  window.confirmOrder = async function(orderId, customerName, customerEmail, items, total) {
    const btn = document.getElementById("btn-" + orderId);
    btn.disabled = true;
    btn.textContent = "Sending...";
    try {
      await emailjs.send(SERVICE_ID, TPL_ORDER, {
        to_name: customerName,
        to_email: customerEmail,
        name: customerName,
        order_id: orderId,
        order_total: total,
        order_items: items,
        message: `Your order has been confirmed!\nItems: ${items}\nTotal: ${total}`
      });
      await updateDoc(doc(db, "orders", orderId), { status: "confirmed" });
      btn.textContent = "✅ Confirmed";
      btn.style.background = "#16A34A";
      document.getElementById("status-" + orderId).textContent = "✅ Confirmed";
      document.getElementById("status-" + orderId).style.color = "#16A34A";
    } catch(e) {
      btn.disabled = false;
      btn.textContent = "Confirm Order";
      alert("Failed: " + e.text || e.message);
    }
  };

  function loadOrders() {
    const q = query(collection(db, "orders"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
      const container = document.getElementById("orders-container");
      const pending = [], confirmed = [];
      snapshot.forEach(d => {
        const o = { id: d.id, ...d.data() };
        if (o.status === "confirmed") confirmed.push(o);
        else pending.push(o);
      });

      document.getElementById("pending-count").textContent = pending.length;
      document.getElementById("total-count").textContent = snapshot.size;

      let html = "";
      if (pending.length === 0 && confirmed.length === 0) {
        html = `<div class="empty"><div style="font-size:56px;margin-bottom:12px">📭</div><h3>No orders yet</h3><p>Orders will appear here in real-time</p></div>`;
      } else {
        if (pending.length > 0) {
          html += `<div class="section-label">🔔 Pending (${pending.length})</div>`;
          pending.forEach(o => html += orderCard(o));
        }
        if (confirmed.length > 0) {
          html += `<div class="section-label" style="margin-top:28px">✅ Confirmed (${confirmed.length})</div>`;
          confirmed.forEach(o => html += orderCard(o));
        }
      }
      container.innerHTML = html;
    });
  }

  function orderCard(o) {
    const time = o.timestamp ? new Date(o.timestamp).toLocaleString("en-IN") : "—";
    const isConfirmed = o.status === "confirmed";
    return `
    <div class="order-card ${isConfirmed ? 'confirmed' : 'pending'}">
      <div class="order-top">
        <div>
          <div class="order-id">#${o.orderId || o.id.slice(0,8).toUpperCase()}</div>
          <div class="order-time">${time}</div>
        </div>
        <span class="badge ${isConfirmed ? 'badge-confirmed' : 'badge-pending'}" id="status-${o.id}">
          ${isConfirmed ? '✅ Confirmed' : '⏳ Pending'}
        </span>
      </div>
      <div class="order-info">
        <div class="info-row"><span>👤 Customer</span><strong>${o.customerName || '—'}</strong></div>
        <div class="info-row"><span>📧 Email</span><strong>${o.customerEmail || '—'}</strong></div>
        <div class="info-row"><span>📱 Phone</span><strong>${o.phone || '—'}</strong></div>
        <div class="info-row"><span>📦 Items</span><strong>${o.items || '—'}</strong></div>
        <div class="info-row"><span>💰 Total</span><strong style="color:#F97316;font-size:16px">${o.total || '—'}</strong></div>
        ${o.address ? `<div class="info-row"><span>📍 Address</span><strong>${o.address}</strong></div>` : ''}
      </div>
      ${!isConfirmed ? `
      <button class="confirm-btn" id="btn-${o.id}"
        onclick="confirmOrder('${o.id}','${(o.customerName||'').replace(/'/g,"\\'")}','${o.customerEmail||''}','${(o.items||'').replace(/'/g,"\\'")}','${o.total||''}')">
        ✅ Confirm &amp; Send Email
      </button>` : `<div class="confirmed-note">Confirmation email sent to customer</div>`}
    </div>`;
  }
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#F97316;--bg:#F8FAFC;--text:#0F172A;--text2:#64748B;--border:#E2E8F0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#fff7ed,#ffedd5)}
.login-card{background:#fff;border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(249,115,22,0.12);text-align:center}
.login-logo{font-size:48px;margin-bottom:12px}
.login-card h1{font-size:24px;font-weight:800;margin-bottom:4px;color:var(--text)}
.login-card p{font-size:14px;color:var(--text2);margin-bottom:28px}
.login-card input{width:100%;border:2px solid var(--border);border-radius:12px;padding:13px 16px;font-size:15px;outline:none;margin-bottom:14px;transition:border .2s}
.login-card input:focus{border-color:var(--orange)}
.login-card button{width:100%;background:var(--orange);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer}
.login-card button:hover{background:#EA580C}
#login-error{color:#ef4444;font-size:13px;margin-top:8px}

/* DASHBOARD */
#dashboard{display:none}
header{background:#fff;border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:12px}
.header-left h1{font-size:20px;font-weight:800;color:var(--text)}
.header-left span{font-size:13px;color:var(--text2)}
.live-badge{background:#dcfce7;color:#16A34A;font-size:12px;font-weight:700;padding:4px 10px;border-radius:50px;display:flex;align-items:center;gap:6px}
.live-dot{width:8px;height:8px;background:#16A34A;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;padding:24px 28px 0}
.stat-card{background:#fff;border-radius:16px;border:1px solid var(--border);padding:16px 20px}
.stat-card .num{font-size:32px;font-weight:800;color:var(--orange);font-family:'Segoe UI',sans-serif}
.stat-card .lbl{font-size:13px;color:var(--text2);margin-top:2px}

.orders-wrap{padding:24px 28px}
.section-label{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}

.order-card{background:#fff;border-radius:18px;border:1px solid var(--border);padding:20px;margin-bottom:14px;transition:box-shadow .2s}
.order-card.pending{border-left:4px solid var(--orange)}
.order-card.confirmed{border-left:4px solid #16A34A;opacity:.85}
.order-card:hover{box-shadow:0 6px 24px rgba(0,0,0,0.07)}
.order-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.order-id{font-size:17px;font-weight:800;color:var(--text)}
.order-time{font-size:12px;color:var(--text2);margin-top:2px}
.badge{font-size:12px;font-weight:700;padding:5px 12px;border-radius:50px}
.badge-pending{background:#fff7ed;color:#F97316}
.badge-confirmed{background:#dcfce7;color:#16A34A}
.order-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.info-row{background:#f8fafc;border-radius:10px;padding:10px 14px;display:flex;flex-direction:column;gap:3px}
.info-row span{font-size:11px;color:var(--text2)}
.info-row strong{font-size:14px;font-weight:600;color:var(--text);word-break:break-word}
.confirm-btn{width:100%;background:var(--orange);color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s}
.confirm-btn:hover{background:#EA580C}
.confirm-btn:disabled{opacity:.5;cursor:not-allowed}
.confirmed-note{text-align:center;font-size:13px;color:#16A34A;font-weight:600;padding:10px}
.empty{text-align:center;padding:80px 20px;color:var(--text2)}
.empty h3{font-size:20px;font-weight:700;margin-bottom:8px;color:var(--text)}
@media(max-width:600px){.order-info{grid-template-columns:1fr}.stats{padding:16px}.orders-wrap{padding:16px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🍲</div>
    <h1>MM Cooking Bowl</h1>
    <p>Admin Dashboard — Enter your password</p>
    <input type="password" id="pass-input" placeholder="Password" onkeydown="if(event.key==='Enter')adminLogin()">
    <button onclick="adminLogin()">Login →</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <div class="header-left">
      <h1>🍲 Admin Dashboard</h1>
      <span>MM Cooking Bowl</span>
    </div>
    <div class="live-badge"><div class="live-dot"></div> Live Orders</div>
  </header>

  <div class="stats">
    <div class="stat-card"><div class="num" id="pending-count">0</div><div class="lbl">Pending Orders</div></div>
    <div class="stat-card"><div class="num" id="total-count">0</div><div class="lbl">Total Orders</div></div>
    <div class="stat-card"><div class="num">📧</div><div class="lbl">Email: 2tomoee@gmail.com</div></div>
  </div>

  <div class="orders-wrap">
    <div id="orders-container"><div class="empty"><div style="font-size:48px">⏳</div><p>Loading orders...</p></div></div>
  </div>
</div>

</body>
</html>
